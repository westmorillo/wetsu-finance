name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /opt/wetsu-finance
          git pull origin master

      - name: Rebuild and restart container
        run: |
          cd /opt/wetsu-finance
          docker compose build --no-cache wetsu-finance
          docker compose up -d --no-deps wetsu-finance
          docker image prune -f
